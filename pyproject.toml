# Конфигурация инструментов разработки. В образ на Railway не попадает
# (Dockerfile ставит только requirements.txt).

[tool.ruff]
# те же исключения, что и у поиска по умолчанию, плюс наши служебные пути
extend-exclude = [".venv", "alembic/versions"]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Осознанно узкий, но осмысленный набор — не «форматтер всего подряд»:
#   F   — pyflakes: неизвестные имена, битые/неиспользуемые импорты;
#   E9  — синтаксические ошибки, которые не поймает даже импорт;
#   B   — flake8-bugbear: реальные ловушки (raise без from, изменяемые
#         значения по умолчанию и т.п.);
#   UP032 — f-string вместо .format (безопасный автофикс).
select = ["F", "E9", "B", "UP032"]
# B008 — вызов в аргументе по умолчанию. Для FastAPI это ИДИОМА
# (Depends(), Form(), Header() в сигнатуре обработчика), а не ошибка.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
# в тестах допустимы длинные вспомогательные конструкции
"tests/*" = ["B011"]
