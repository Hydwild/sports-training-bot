<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand_name }} — админка</title>
  <style>
    :root { --brand: {{ brand_color }}; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: #f4f6fb; color: #1a1a2e; }
    header { background: var(--brand); color: #fff; padding: 14px 24px;
             display: flex; align-items: center; gap: 14px; }
    header img { height: 32px; border-radius: 6px; }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .spacer { flex: 1; }
    header a { color: #fff; text-decoration: none; opacity: .9; font-size: 14px; }
    main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; padding: 18px 20px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
    .role { font-size: 12px; background: rgba(255,255,255,.2); padding: 3px 8px;
            border-radius: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid #eef; font-size: 14px; }
    th { color: #667; font-weight: 600; }
    .btn { display: inline-block; background: var(--brand); color: #fff;
           padding: 7px 14px; border-radius: 8px; text-decoration: none;
           font-size: 13px; border: none; cursor: pointer; }
    .btn.sm { padding: 4px 10px; font-size: 12px; }
    .muted { color: #889; font-size: 13px; }
    .tag { font-size: 12px; padding: 2px 8px; border-radius: 6px; }
    .ok { background: #e3f6e8; color: #1a7f3c; }
    .no { background: #fdeaea; color: #c0392b; }
  </style>
</head>
<body>
  <header>
    {% if brand_logo_url %}<img src="{{ brand_logo_url }}" alt="logo">{% endif %}
    <h1>{{ brand_name }}</h1>
    {% if role %}<span class="role">{{ role }}</span>{% endif %}
    <div class="spacer"></div>
    {% if role %}<a href="/admin/logout">Выйти</a>{% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
