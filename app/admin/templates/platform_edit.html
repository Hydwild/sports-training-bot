{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Изменить клуб «{{ t.name }}» (id={{ t.id }})</h2>
  {% if saved %}<p class="tag ok">Сохранено</p>{% endif %}
  {% if error %}<p class="tag no">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/platform/{{ t.id }}/edit">
    <input type="hidden" name="csrf" value="{{ csrf }}">

    <p><label>Название клуба<br>
      <input name="club_name" required value="{{ t.name }}"
             style="width:100%;padding:8px"></label></p>

    <p><label>Часовой пояс<br>
      <select name="timezone" style="padding:8px">
        {% for tz in ["Europe/Moscow", "Europe/Kaliningrad", "Europe/Samara",
                      "Asia/Yekaterinburg", "Asia/Omsk", "Asia/Novosibirsk",
                      "Asia/Krasnoyarsk", "Asia/Irkutsk", "Asia/Yakutsk",
                      "Asia/Vladivostok"] %}
        <option {% if t.timezone == tz %}selected{% endif %}>{{ tz }}</option>
        {% endfor %}
      </select></label></p>

    <h3>Токены ботов</h3>
    <p class="muted">Оставьте поле пустым, чтобы отвязать бота от клуба.</p>
    <p><label>Токен Telegram-бота<br>
      <input name="tg_token" value="{{ t.tg_token or '' }}"
             placeholder="123456:ABC..." style="width:100%;padding:8px"></label></p>
    <p><label>Токен сообщества ВКонтакте<br>
      <input name="vk_token" value="{{ t.vk_token or '' }}"
             placeholder="vk1.a...." style="width:100%;padding:8px"></label></p>

    <h3>Тренер клиента</h3>
    <p><label>Telegram ID тренера<br>
      <input name="admin_tg_id" type="number" value="{{ t.admin_tg_id or '' }}"
             placeholder="123456789" style="width:100%;padding:8px"></label></p>
    <p><label>VK ID тренера<br>
      <input name="admin_vk_id" type="number" value="{{ t.admin_vk_id or '' }}"
             placeholder="987654321" style="width:100%;padding:8px"></label></p>

    <h3>Демо</h3>
    <p><label><input type="checkbox" name="is_demo" value="1"
       {% if t.is_demo %}checked{% endif %}>
       Это демо-клуб (любой написавший боту может выбрать роль «тренер» или
       «участник»; данные сбрасываются каждую ночь)</label></p>

    <p><button class="btn" type="submit">Сохранить</button>
       <a href="/admin/platform" style="margin-left:10px">← к списку</a></p>
  </form>
</div>
{% endblock %}
