name: CI

# Прогон на каждый push и pull request. В настройках сервиса на Railway
# включён «Wait for CI» — красная сборка до прода не доезжает.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # новый push в ту же ветку отменяет предыдущий прогон
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Тесты и линтер
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Причину падения выносим в аннотацию прогона: она видна на странице
      # Actions без входа в GitHub, в отличие от полного лога.
      # ruff без флагов — та же команда, что и локально (правила в
      # pyproject.toml), а не расходящийся --select.
      - name: Линтер
        run: |
          set +e
          ruff check . > lint.log 2>&1
          code=$?
          cat lint.log
          if [ $code -ne 0 ]; then
            echo "::error title=Линтер::$(tail -c 1500 lint.log | tr '\n' ' ')"
          fi
          exit $code

      - name: Тесты
        run: |
          set +e
          # именно `python -m`: так корень проекта попадает в sys.path и
          # conftest.py находит пакет app (голый `pytest` этого не делает)
          python -m pytest -q > tests.log 2>&1
          code=$?
          cat tests.log
          if [ $code -ne 0 ]; then
            echo "::error title=Тесты (код $code)::$(tail -c 1500 tests.log | tr '\n' ' ')"
          fi
          exit $code

  migrations:
    name: Миграции на PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ci
      ADMIN_API_TOKEN: ci-token
      JWT_SECRET: ci-secret
      TG_TOKEN: '123456:CITOKEN'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Прод разворачивается именно так. Пока эти шаги зелёные, развёртывание
      # с нуля на чистую базу заведомо поднимется.
      - name: Накат миграций на чистую базу
        run: alembic upgrade head

      - name: Схема совпадает с моделями
        run: alembic check

      - name: Откат до нуля и обратно
        run: |
          alembic downgrade base
          alembic upgrade head

      # Тесты, которым нужна НАСТОЯЩАЯ PostgreSQL: конкурентный захват
      # outbox (SKIP LOCKED) и общий счётчик лимита на живой базе. На
      # SQLite они бы проверяли не тот механизм.
      - name: Тесты на живом PostgreSQL
        run: python -m pytest -q -m pg tests/test_pg_concurrency.py

      # backup -> restore на настоящей базе: снимаем дамп, восстанавливаем
      # во ВТОРУЮ базу, проверяем. Ровно то, что делает restore_drill.
      - name: Проверка backup → restore
        env:
          PGPASSWORD: postgres
        run: |
          set -e
          createdb -h localhost -U postgres -p 5432 restore_target
          pg_dump --no-owner --no-acl \
            --dbname "postgresql://postgres:postgres@localhost:5432/ci" \
            > /tmp/ci_dump.sql
          test -s /tmp/ci_dump.sql
          grep -q "CREATE TABLE" /tmp/ci_dump.sql
          psql -v ON_ERROR_STOP=1 \
            "postgresql://postgres:postgres@localhost:5432/restore_target" \
            < /tmp/ci_dump.sql
          # восстановленная база отвечает на запрос к критической таблице
          psql -v ON_ERROR_STOP=1 -tAqc "SELECT count(*) FROM tenants;" \
            "postgresql://postgres:postgres@localhost:5432/restore_target"
          dropdb -h localhost -U postgres -p 5432 restore_target

  image:
    name: Образ и smoke-тест
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prod
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # Собираем ровно тот образ, который поедет на Railway: сломанный
      # Dockerfile или отсутствующий системный пакет иначе всплывают уже
      # на проде (так однажды и случилось с pg_dump).
      - name: Сборка образа
        run: docker build -t booking-bot:ci .

      # ---- Lite / SQLite ----
      - name: Lite (SQLite) — запуск
        run: |
          docker run -d --name smoke_lite -p 8000:8000 \
            -e EDITION=lite \
            -e DATABASE_URL=sqlite+aiosqlite:////data/smoke.db \
            -e ADMIN_API_TOKEN=ci-token \
            -e JWT_SECRET=ci-secret-ci-secret-ci-secret \
            -e TG_TOKEN=123456:CITOKEN \
            -e TG_MODE=webhook -e TG_WEBHOOK_SECRET=ci-webhook-secret \
            -e RUN_VK_POLLING=false \
            booking-bot:ci

      - name: Lite — /health и публичные страницы
        run: bash .github/smoke.sh 8000 lite sqlite

      # ---- Pro / PostgreSQL: тот же start.sh, миграции, edition=pro ----
      - name: Pro (PostgreSQL) — запуск
        run: |
          docker run -d --name smoke_pro -p 8001:8000 \
            --add-host=host.docker.internal:host-gateway \
            -e EDITION=pro \
            -e DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/prod \
            -e ADMIN_API_TOKEN=ci-token \
            -e JWT_SECRET=ci-secret-ci-secret-ci-secret \
            -e BOT_TOKEN_ENC_KEY=ci-bot-key -e BACKUP_ENC_KEY=ci-backup-key \
            -e TG_TOKEN=123456:CITOKEN \
            -e TG_MODE=webhook -e TG_WEBHOOK_SECRET=ci-webhook-secret \
            -e RUN_VK_POLLING=false \
            booking-bot:ci

      - name: Pro — /health c edition=pro и db=postgres
        run: bash .github/smoke.sh 8001 pro postgres

      - name: Логи контейнеров
        if: always()
        run: |
          echo "=== lite ==="; docker logs smoke_lite | tail -60 || true
          echo "=== pro ===";  docker logs smoke_pro  | tail -60 || true

      - name: Остановка
        if: always()
        run: docker rm -f smoke_lite smoke_pro || true
