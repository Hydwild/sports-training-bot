name: CI

# Прогон на каждый push и pull request. В настройках сервиса на Railway
# включён «Wait for CI» — красная сборка до прода не доезжает.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # новый push в ту же ветку отменяет предыдущий прогон
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Тесты и линтер
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Причину падения выносим в аннотацию прогона: она видна на странице
      # Actions без входа в GitHub, в отличие от полного лога.
      - name: "Линтер: неизвестные имена и битые импорты"
        run: |
          set +e
          ruff check --select F . > lint.log 2>&1
          code=$?
          cat lint.log
          if [ $code -ne 0 ]; then
            echo "::error title=Линтер::$(tail -c 1500 lint.log | tr '\n' ' ')"
          fi
          exit $code

      - name: Тесты
        run: |
          set +e
          # именно `python -m`: так корень проекта попадает в sys.path и
          # conftest.py находит пакет app (голый `pytest` этого не делает)
          python -m pytest -q > tests.log 2>&1
          code=$?
          cat tests.log
          if [ $code -ne 0 ]; then
            echo "::error title=Тесты (код $code)::$(tail -c 1500 tests.log | tr '\n' ' ')"
          fi
          exit $code

  migrations:
    name: Миграции на PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ci
      ADMIN_API_TOKEN: ci-token
      JWT_SECRET: ci-secret
      TG_TOKEN: '123456:CITOKEN'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Прод разворачивается именно так. Пока эти шаги зелёные, развёртывание
      # с нуля на чистую базу заведомо поднимется.
      - name: Накат миграций на чистую базу
        run: alembic upgrade head

      - name: Схема совпадает с моделями
        run: alembic check

      - name: Откат до нуля и обратно
        run: |
          alembic downgrade base
          alembic upgrade head

  image:
    name: Образ и smoke-тест
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Собираем ровно тот образ, который поедет на Railway: сломанный
      # Dockerfile или отсутствующий системный пакет иначе всплывают уже
      # на проде (так однажды и случилось с pg_dump).
      - name: Сборка образа
        run: docker build -t booking-bot:ci .

      - name: Запуск контейнера
        run: |
          docker run -d --name smoke -p 8000:8000 \
            -e EDITION=lite \
            -e DATABASE_URL=sqlite+aiosqlite:////data/smoke.db \
            -e ADMIN_API_TOKEN=ci-token \
            -e JWT_SECRET=ci-secret-ci-secret-ci-secret \
            -e TG_TOKEN=123456:CITOKEN \
            -e TG_MODE=webhook \
            -e TG_WEBHOOK_SECRET=ci-webhook-secret \
            -e RUN_VK_POLLING=false \
            booking-bot:ci

      - name: Приложение отвечает и открывает публичные страницы
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null; then break; fi
            sleep 2
          done
          health=$(curl -fsS http://localhost:8000/health) || {
            echo "::error title=Smoke::/health не ответил"
            docker logs smoke | tail -50
            exit 1
          }
          echo "health: $health"
          for path in /promo /faq /privacy /reviews; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8000$path")
            echo "$path -> $code"
            if [ "$code" != "200" ]; then
              echo "::error title=Smoke::$path вернул $code"
              docker logs smoke | tail -50
              exit 1
            fi
          done

      - name: Логи контейнера
        if: always()
        run: docker logs smoke | tail -80

      - name: Остановка
        if: always()
        run: docker rm -f smoke || true
